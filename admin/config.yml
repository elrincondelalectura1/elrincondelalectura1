backend:
  name: github
  repo: TU-USUARIO-GITHUB/elrincondelalectura
  branch: main

media_folder: "static/uploads"
public_folder: "/uploads"

locale: es

collections:
  - name: "resenas"
    label: "📖 Reseñas y publicaciones"
    folder: "content/resenas"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título del libro", name: "titulo", widget: "string" }
      - { label: "Autor/a", name: "autor", widget: "string" }
      - { label: "Tipo", name: "tipo", widget: "select", options: ["Reseña", "Recomendación", "Favorito del mes", "En lectura"] }
      - { label: "Puntuación", name: "puntuacion", widget: "select", options: ["★★★★★", "★★★★☆", "★★★☆☆", "★★☆☆☆", "★☆☆☆☆"] }
      - { label: "Imagen", name: "imagen", widget: "image", required: false }
      - { label: "Reseña", name: "body", widget: "markdown" }
      - { label: "Enlace Amazon (afiliado)", name: "amazon", widget: "string", required: false }
      - { label: "Precio", name: "precio", widget: "string", required: false }
      - { label: "Fecha", name: "fecha", widget: "datetime", format: "DD MMM YYYY" }

  - name: "productos"
    label: "🛒 Productos Amazon"
    folder: "content/productos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre del producto", name: "titulo", widget: "string" }
      - { label: "Autor/descripción", name: "autor", widget: "string" }
      - { label: "Imagen", name: "imagen", widget: "image", required: false }
      - { label: "Precio", name: "precio", widget: "string" }
      - { label: "Puntuación", name: "puntuacion", widget: "select", options: ["★★★★★", "★★★★☆", "★★★☆☆", "★★☆☆☆", "★☆☆☆☆"] }
      - { label: "Enlace Amazon (afiliado)", name: "amazon", widget: "string" }
